version: '3.8'

services:
  # Database Service: PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: voxforge_postgres
    restart: always
    environment:
      POSTGRES_USER: voxforge_admin
      POSTGRES_PASSWORD: voxforge_secure_pass_1025
      POSTGRES_DB: voxforge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxforge_admin -d voxforge_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - voxforge_network

  # Cache & Task Broker: Redis
  redis:
    image: redis:7-alpine
    container_name: voxforge_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - voxforge_network

  # Backend Service: FastAPI REST API
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: voxforge_api
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://voxforge_admin:voxforge_secure_pass_1025@db:5432/voxforge_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voxforge_network

  # Asynchronous Queue Worker: Celery
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: voxforge_celery_worker
    restart: always
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql://voxforge_admin:voxforge_secure_pass_1025@db:5432/voxforge_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voxforge_network

networks:
  voxforge_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
